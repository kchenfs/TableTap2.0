# Grafana admin credentials, sourced from AWS Parameter Store via ESO.
# The kube-prometheus-stack Grafana chart reads this secret (grafana.admin.existingSecret),
# which stops ArgoCD's helm-template render from regenerating a random password each sync.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store-cluster
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: /momotaro/dev/GRAFANA_ADMIN_USER
    - secretKey: admin-password
      remoteRef:
        key: /momotaro/dev/GRAFANA_ADMIN_PASSWORD
