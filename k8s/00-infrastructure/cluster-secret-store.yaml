# Cluster-scoped SecretStore so namespaces other than `default` (e.g. monitoring)
# can pull from AWS Parameter Store. Reuses the same `aws-credentials` secret
# that lives in the default namespace (referenced explicitly via namespace).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store-cluster
spec:
  provider:
    aws:
      service: ParameterStore
      region: ca-central-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key
            namespace: default
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
            namespace: default
