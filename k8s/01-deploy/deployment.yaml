apiVersion: apps/v1
kind: Deployment
metadata:
  name: momotaro-v2
  namespace: default
  annotations:
    prometheus.io/scrape: "false"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: momotaro-v2
  template:
    metadata:
      labels:
        app: momotaro-v2
    spec:
      containers:
        - name: momotaro-v2
          image: ghcr.io/kchenfs/tabletap2.0:latest
          ports:
            - containerPort: 3000
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: momotaro-secrets
                  key: API_KEY
            - name: API_DINE_IN
              valueFrom:
                secretKeyRef:
                  name: momotaro-secrets
                  key: API_DINE_IN
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
