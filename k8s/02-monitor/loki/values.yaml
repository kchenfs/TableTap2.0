# k8s/02-monitor/loki/values.yaml
# Chart: grafana-community/loki (forked from grafana/loki at 6.55.0)
# SingleBinary mode - perfect for single node homelab, uses local filesystem

# CRITICAL: Override the default SimpleScalable mode
# SimpleScalable requires object storage (S3/GCS) which we don't have
# SingleBinary uses local filesystem and is much simpler
deploymentMode: SingleBinary

loki:
  # Single tenant mode - no auth needed for homelab
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  # Use local filesystem for storage (no object store needed)
  storage:
    type: filesystem

  # Schema config required for filesystem storage
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  # Keep logs for 7 days to save disk space
  limits_config:
    retention_period: 120h      # 7 days
    ingestion_rate_mb: 4
    ingestion_burst_size_mb: 8
    allow_structured_metadata: false

  # Enable compactor to enforce retention
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
    working_directory: /var/loki/compactor

# Single binary pod config
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 8Gi

# Disable all distributed mode components
# These are only used in SimpleScalable and Distributed modes
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable gateway (Promtail talks directly to Loki)
gateway:
  enabled: false

# Disable minio (we use local filesystem not object storage)
minio:
  enabled: false
